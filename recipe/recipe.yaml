context:
  name: essnmx
  version: "26.2.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/essnmx-${{ version }}.tar.gz
  sha256: a76b43b94a14607ccb408ecd6e4580080ebf094ba02611a300c53f83ab4bf451

build:
  number: 0
  skip: match(python, "<3.11")
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - setuptools >=77
    - setuptools-scm >=8.0
    - pip
  run:
    - python
    - dask-core >=2022.1.0
    - essreduce >=26.1.1
    - python-graphviz
    - plopp >=24.7.0
    - sciline >=24.06.0
    - scipp >=25.3.0
    - scippnexus >=23.12.0
    - pooch >=1.5
    - pandas >=2.1.2
    - gemmi >=0.6.6
    - defusedxml >=0.7.1
    # bitshuffle conda forge recipe doesn't support win
    - if: not win
      then: bitshuffle >=0.5.2
    - msgpack-python >=1.0.8
    - tof >=25.12.1

tests:
  - python:
      imports:
        - ess.nmx

about:
  summary: Data reduction for NMX at the European Spallation Source.
  license: BSD-3-Clause
  license_file: LICENSE
  repository: https://github.com/scipp/essnmx
  homepage: https://scipp.github.io/essnmx/

extra:
  recipe-maintainers:
    - MridulS
    - conda-forge/scipp
