context:
  name: essnmx
  version: "26.4.0"
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/essnmx-${{ version }}.tar.gz
  sha256: 4a6b56e9a23c9877faf8deedea85b99121a59f6f72efae712d6d0cc4265691b3

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=77
    - setuptools-scm >=8.0
    - pip
  run:
    - python >=${{ python_min }}
    - dask-core >=2022.1.0
    - essreduce >=26.4.0
    - python-graphviz
    - plopp >=24.7.0
    - sciline >=24.06.0
    - scipp >=25.3.0
    - scippnexus >=23.12.0
    - pooch >=1.5
    - pandas >=2.1.2
    - gemmi >=0.6.6
    - defusedxml >=0.7.1
    - msgpack-python >=1.0.8
    - tof >=25.12.1

tests:
  - python:
      imports:
        - ess.nmx
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Data reduction for NMX at the European Spallation Source.
  license: BSD-3-Clause
  license_file: LICENSE
  repository: https://github.com/scipp/essnmx
  homepage: https://scipp.github.io/essnmx/

extra:
  recipe-maintainers:
    - MridulS
    - conda-forge/scipp
